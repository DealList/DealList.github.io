name: DCM 데이터 자동 수집

# cron + 수동 trigger 둘 다 지원
on:
  workflow_dispatch:
    inputs:
      start_date:
        description: '조회 시작일 (YYYY-MM-DD) — 비우면 어제 자동 지정'
        required: false
        default: ''
      end_date:
        description: '조회 종료일 (YYYY-MM-DD) — 비우면 어제 자동 지정'
        required: false
        default: ''
  schedule:
    # 매일 한국시간 06:17 (UTC 21:17 전날) 자동 실행.
    # :00 분 정각은 글로벌 cron 부하 피크라 GitHub Actions 가 1시간 이상 지연시키는
    # 경우가 잦음. 17분 같은 어중간한 분으로 옮겨 거의 정시 발사 보장.
    # 새벽 시간대 (UTC 21~22) 도 트래픽 적어 추가로 유리.
    # 빈 날짜 → "어제 UTC" 로 자동 보정되므로 KST 어제 1일치를 안전하게 수집.
    - cron: '17 21 * * *'

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write    # web/*.json 자동 commit/push 위해 필요
    steps:
      - name: Repo checkout
        uses: actions/checkout@v4
        with:
          # 자동 commit 시 GITHUB_TOKEN 으로 push 하려면 persist-credentials true (기본값)
          fetch-depth: 0

      - name: Python 3.12 setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r auto/requirements.txt

      - name: 날짜 입력 정규화 (수동=3일전~오늘 / 자동=어제)
        id: dates
        run: |
          START="${{ github.event.inputs.start_date }}"
          END="${{ github.event.inputs.end_date }}"
          EVENT="${{ github.event_name }}"
          # KST 기준 — UTC runner 라서 timezone 명시
          KST_TODAY=$(TZ=Asia/Seoul date +%Y-%m-%d)
          KST_YESTERDAY=$(TZ=Asia/Seoul date -d "yesterday" +%Y-%m-%d)
          KST_3DAYS=$(TZ=Asia/Seoul date -d "3 days ago" +%Y-%m-%d)
          # 빈 값 기본치: 자동(schedule)=어제 1일 / 수동(dispatch)=3일전~오늘 (당일 후속공시 포착)
          if [ "$EVENT" = "schedule" ]; then
            DEF_START=$KST_YESTERDAY; DEF_END=$KST_YESTERDAY
          else
            DEF_START=$KST_3DAYS; DEF_END=$KST_TODAY
          fi
          [ -z "$START" ] && START=$DEF_START
          [ -z "$END" ] && END=$DEF_END
          echo "start=$START" >> $GITHUB_OUTPUT
          echo "end=$END" >> $GITHUB_OUTPUT
          echo "트리거=$EVENT · 조회 범위 (KST): $START ~ $END"

      - name: Supabase → meta.json + xlsx 복원
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python auto/sync_from_supabase.py --build-xlsx

      - name: cmd_update 실행 (DART → meta.json + xlsx)
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
        run: |
          python -m auto.main --update "DCM Table.xlsx" \
            "${{ steps.dates.outputs.start }}" \
            "${{ steps.dates.outputs.end }}" \
            -o "DCM Table.xlsx"

      - name: meta.json → Supabase upsert
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python auto/sync_to_supabase.py

      # 최초 증권신고서 공시일 백필 (방식A — list API only, 본문 0건 → IP 차단 무관).
      # disclosure_date 가 빈 신규 건만 채움. 비핵심이라 실패해도 export 는 계속.
      - name: 최초 공시일 백필 (신규 건)
        continue-on-error: true
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python auto/backfill_dcm_disclosure.py

      - name: web/*.json 빌드 + root 배치 (사이트가 fetch 할 데이터)
        run: |
          python auto/export_web.py
          # export_web.py 가 web/ 에 떨어뜨린 파일을 GitHub Pages root 로 이동.
          # (로컬에서는 sync_to_github.py 가 같은 일을 함)
          cp web/data.json data.json
          cp web/meta.json meta.json
          cp web/summary.json summary.json
          # web/ 디렉터리는 commit 대상 아님 (.gitignore 처리 또는 단순 미커밋)
          ls -la data.json meta.json summary.json

      - name: Supabase Storage 업로드 (data + meta + summary → site-data 버킷)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          # Phase 2 게이팅: GitHub Pages 가 아닌 Supabase Storage 의 비공개 버킷에 업로드.
          # site-data 버킷 RLS 가 status=approved 회원만 signed URL 발급 → 진짜 게이팅.
          # service_role 키는 RLS 우회하므로 업로드는 무제한.
          for f in data.json meta.json summary.json; do
            echo "Uploading $f to site-data ..."
            HTTP_CODE=$(curl --silent --show-error --output /tmp/upload-resp.txt --write-out "%{http_code}" \
              -X POST "$SUPABASE_URL/storage/v1/object/site-data/$f" \
              -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
              -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
              -H "Content-Type: application/json" \
              -H "x-upsert: true" \
              --data-binary "@$f")
            if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "201" ]; then
              echo "[FAIL] $f upload — HTTP $HTTP_CODE"
              cat /tmp/upload-resp.txt
              exit 1
            fi
            echo "[ok] $f uploaded (HTTP $HTTP_CODE)"
          done

      - name: Artifact 보관 (디버깅용 xlsx + meta.json 백업)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: data-${{ github.run_id }}
          path: |
            DCM Table.xlsx
            DCM Table.meta.json
          retention-days: 14
