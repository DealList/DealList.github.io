name: 데이터 자동 수집

# cron + 수동 trigger 둘 다 지원
on:
  workflow_dispatch:
    inputs:
      start_date:
        description: '조회 시작일 (YYYY-MM-DD) — 비우면 어제 자동 지정'
        required: false
        default: ''
      end_date:
        description: '조회 종료일 (YYYY-MM-DD) — 비우면 어제 자동 지정'
        required: false
        default: ''
  schedule:
    # 매일 한국시간 06:17 (UTC 21:17 전날) 자동 실행.
    # :00 분 정각은 글로벌 cron 부하 피크라 GitHub Actions 가 1시간 이상 지연시키는
    # 경우가 잦음. 17분 같은 어중간한 분으로 옮겨 거의 정시 발사 보장.
    # 새벽 시간대 (UTC 21~22) 도 트래픽 적어 추가로 유리.
    # 빈 날짜 → "어제 UTC" 로 자동 보정되므로 KST 어제 1일치를 안전하게 수집.
    - cron: '17 21 * * *'

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write    # web/*.json 자동 commit/push 위해 필요
    steps:
      - name: Repo checkout
        uses: actions/checkout@v4
        with:
          # 자동 commit 시 GITHUB_TOKEN 으로 push 하려면 persist-credentials true (기본값)
          fetch-depth: 0

      - name: Python 3.12 setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r auto/requirements.txt

      - name: 날짜 입력 정규화 (빈 값 → 어제 KST)
        id: dates
        run: |
          START="${{ github.event.inputs.start_date }}"
          END="${{ github.event.inputs.end_date }}"
          # KST 기준 "어제" — UTC runner 라서 명시적으로 timezone 지정해야 함
          KST_YESTERDAY=$(TZ=Asia/Seoul date -d "yesterday" +%Y-%m-%d)
          if [ -z "$START" ]; then
            START=$KST_YESTERDAY
            echo "start_date 비어있음 → $START (어제 KST)"
          fi
          if [ -z "$END" ]; then
            END=$KST_YESTERDAY
            echo "end_date 비어있음 → $END (어제 KST)"
          fi
          echo "start=$START" >> $GITHUB_OUTPUT
          echo "end=$END" >> $GITHUB_OUTPUT
          echo "조회 범위 (KST): $START ~ $END"

      - name: Supabase → meta.json + xlsx 복원
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python auto/sync_from_supabase.py --build-xlsx

      - name: cmd_update 실행 (DART → meta.json + xlsx)
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
        run: |
          python -m auto.main --update "DCM Table.xlsx" \
            "${{ steps.dates.outputs.start }}" \
            "${{ steps.dates.outputs.end }}" \
            -o "DCM Table.xlsx"

      - name: meta.json → Supabase upsert
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python auto/sync_to_supabase.py

      - name: web/*.json 빌드 + root 배치 (사이트가 fetch 할 데이터)
        run: |
          python auto/export_web.py
          # export_web.py 가 web/ 에 떨어뜨린 파일을 GitHub Pages root 로 이동.
          # (로컬에서는 sync_to_github.py 가 같은 일을 함)
          cp web/data.json data.json
          cp web/meta.json meta.json
          cp web/summary.json summary.json
          # web/ 디렉터리는 commit 대상 아님 (.gitignore 처리 또는 단순 미커밋)
          ls -la data.json meta.json summary.json

      - name: data.json/meta.json/summary.json 변경분 자동 commit + push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json meta.json summary.json || true
          if git diff --cached --quiet; then
            echo "변경 없음 — commit 생략"
          else
            FETCHED="${{ steps.dates.outputs.start }}"
            git commit -m "data: 자동 갱신 ${FETCHED} (KST) [skip ci]"
            git push
            echo "[ok] data.json/meta.json/summary.json push 완료"
          fi

      - name: Artifact 보관 (디버깅용 xlsx + meta.json 백업)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: data-${{ github.run_id }}
          path: |
            DCM Table.xlsx
            DCM Table.meta.json
          retention-days: 14
