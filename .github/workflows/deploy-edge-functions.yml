name: Deploy Edge Functions

# supabase/functions/** 가 변경된 push 시 자동 배포.
# 수동 실행도 가능 (workflow_dispatch).
on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
  workflow_dispatch:

jobs:
  deploy-generate-article:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_REF: noacmyjepbtdvycrzsmj
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy generate-article
        run: |
          supabase functions deploy generate-article \
            --project-ref "$PROJECT_REF"
