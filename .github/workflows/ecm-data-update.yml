name: ECM 데이터 자동 수집

# DCM 워크플로(data-update.yml)와 별도 — 실패 격리 (ECM 오류가 DCM 갱신을 막지 않음).
# 같은 일일 cron 으로 DCM·ECM 모두 매일 갱신.
on:
  workflow_dispatch:
    inputs:
      start_date:
        description: '조회 시작일 (YYYY-MM-DD) — 비우면 어제(KST)'
        required: false
        default: ''
      end_date:
        description: '조회 종료일 (YYYY-MM-DD) — 비우면 어제(KST)'
        required: false
        default: ''
      force:
        description: '이미 처리된 딜도 재처리 (백로그 명단 백필용. true 로 두면 구간 전체 재처리)'
        required: false
        default: 'false'
  schedule:
    # 매일 한국시간 05:53 = UTC 20:53. DCM(06:17 KST)보다 24분 이르고, UTC 21시대 글로벌
    # 혼잡 윈도우를 피해 cron 미스파이어 확률을 낮춤. 빈 날짜 → 어제(KST) 1일치.
    - cron: '53 20 * * *'

jobs:
  update-ecm:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - name: Repo checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Python 3.12 setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r auto/requirements.txt

      - name: 날짜 정규화 (수동=3일전~오늘 / 자동=어제)
        id: dates
        run: |
          START="${{ github.event.inputs.start_date }}"
          END="${{ github.event.inputs.end_date }}"
          EVENT="${{ github.event_name }}"
          KST_TODAY=$(TZ=Asia/Seoul date +%Y-%m-%d)
          KST_YESTERDAY=$(TZ=Asia/Seoul date -d "yesterday" +%Y-%m-%d)
          KST_3DAYS=$(TZ=Asia/Seoul date -d "3 days ago" +%Y-%m-%d)
          # 빈 값 기본치: 자동(schedule)=어제 1일 / 수동(dispatch)=3일전~오늘 (당일 후속공시 포착)
          if [ "$EVENT" = "schedule" ]; then
            DEF_START=$KST_YESTERDAY; DEF_END=$KST_YESTERDAY
          else
            DEF_START=$KST_3DAYS; DEF_END=$KST_TODAY
          fi
          [ -z "$START" ] && START=$DEF_START
          [ -z "$END" ] && END=$DEF_END
          echo "start=$START" >> $GITHUB_OUTPUT
          echo "end=$END" >> $GITHUB_OUTPUT
          echo "ECM 트리거=$EVENT · 조회 범위 (KST): $START ~ $END"

      - name: DART → Supabase upsert (신규 딜)
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          FORCE=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then FORCE="--force"; fi
          python -X utf8 auto/cloud_update_ecm.py \
            "${{ steps.dates.outputs.start }}" "${{ steps.dates.outputs.end }}" $FORCE

      - name: IPO 보고서 follow-up + KIND 재확인
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python -X utf8 auto/cloud_finalize_ecm.py

      # NOTE: step1-only IPO 백로그 명단 백필은 별도(backfill_ecm_names.py)로 1회만 실행.
      # GitHub 클라우드 IP 는 DART 본문 스크래핑(fetch_deal_filings)이 차단되므로 여기선 제외.
      # 신규 IPO 는 위 'DART → Supabase upsert'(API 기반 문서조회)에서 자동으로 명단이 채워짐.

      - name: Supabase → web JSON 빌드 + root 배치
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python -X utf8 auto/export_web_ecm.py
          cp web/ecm_data.json ecm_data.json
          cp web/ecm_meta.json ecm_meta.json
          cp web/ecm_summary.json ecm_summary.json
          ls -la ecm_data.json ecm_meta.json ecm_summary.json

      - name: Supabase Storage 업로드 (ecm_data + ecm_meta + ecm_summary → site-data 버킷)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          # Phase 2 게이팅: GitHub Pages 가 아닌 Supabase Storage 의 비공개 버킷에 업로드.
          # site-data 버킷 RLS 가 status=approved 회원만 signed URL 발급 → 진짜 게이팅.
          # service_role 키는 RLS 우회하므로 업로드는 무제한.
          for f in ecm_data.json ecm_meta.json ecm_summary.json; do
            echo "Uploading $f to site-data ..."
            HTTP_CODE=$(curl --silent --show-error --output /tmp/upload-resp.txt --write-out "%{http_code}" \
              -X POST "$SUPABASE_URL/storage/v1/object/site-data/$f" \
              -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
              -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
              -H "Content-Type: application/json" \
              -H "x-upsert: true" \
              --data-binary "@$f")
            if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "201" ]; then
              echo "[FAIL] $f upload — HTTP $HTTP_CODE"
              cat /tmp/upload-resp.txt
              exit 1
            fi
            echo "[ok] $f uploaded (HTTP $HTTP_CODE)"
          done
