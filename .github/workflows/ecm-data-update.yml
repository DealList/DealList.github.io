name: ECM 데이터 자동 수집

# DCM 워크플로(data-update.yml)와 별도 — 실패 격리 (ECM 오류가 DCM 갱신을 막지 않음).
# 같은 일일 cron 으로 DCM·ECM 모두 매일 갱신.
on:
  workflow_dispatch:
    inputs:
      start_date:
        description: '조회 시작일 (YYYY-MM-DD) — 비우면 어제(KST)'
        required: false
        default: ''
      end_date:
        description: '조회 종료일 (YYYY-MM-DD) — 비우면 어제(KST)'
        required: false
        default: ''
  schedule:
    # 매일 한국시간 09:05 (DCM 09:00 직후). 빈 날짜 → 어제(KST) 1일치.
    - cron: '5 0 * * *'

jobs:
  update-ecm:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - name: Repo checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Python 3.12 setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r auto/requirements.txt

      - name: 날짜 정규화 (빈 값 → 어제 KST)
        id: dates
        run: |
          START="${{ github.event.inputs.start_date }}"
          END="${{ github.event.inputs.end_date }}"
          KST_YESTERDAY=$(TZ=Asia/Seoul date -d "yesterday" +%Y-%m-%d)
          [ -z "$START" ] && START=$KST_YESTERDAY
          [ -z "$END" ] && END=$KST_YESTERDAY
          echo "start=$START" >> $GITHUB_OUTPUT
          echo "end=$END" >> $GITHUB_OUTPUT
          echo "ECM 조회 범위 (KST): $START ~ $END"

      - name: DART → Supabase upsert (신규 딜)
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python -X utf8 auto/cloud_update_ecm.py \
            "${{ steps.dates.outputs.start }}" "${{ steps.dates.outputs.end }}"

      - name: IPO 보고서 follow-up + KIND 재확인
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python -X utf8 auto/cloud_finalize_ecm.py

      - name: Supabase → web JSON 빌드 + root 배치
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python -X utf8 auto/export_web_ecm.py
          cp web/ecm_data.json ecm_data.json
          cp web/ecm_meta.json ecm_meta.json
          cp web/ecm_summary.json ecm_summary.json
          ls -la ecm_data.json ecm_meta.json ecm_summary.json

      - name: ecm_*.json 변경분 자동 commit + push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ecm_data.json ecm_meta.json ecm_summary.json || true
          if git diff --cached --quiet; then
            echo "ECM 변경 없음 — commit 생략"
          else
            git commit -m "data(ecm): 자동 갱신 ${{ steps.dates.outputs.start }} (KST) [skip ci]"
            git push
            echo "[ok] ecm JSON push 완료"
          fi
