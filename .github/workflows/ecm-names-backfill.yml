name: ECM 명단 백필 (수동)

# step1-only(발행조건확정 전) IPO 백로그의 주관/인수 '명단'을 1회 채우는 수동 워크플로.
# OpenDART 문서 섹션 API 사용(드롭다운 스크래핑 X)이라 GitHub 클라우드 IP 에서도 동작.
# dry=true(기본): 미리보기만(DB 안 건드림). dry=false: 실제 반영 + JSON 재생성 + Storage 업로드.
on:
  workflow_dispatch:
    inputs:
      kind:
        description: '대상 (ipo / rights / both)'
        required: false
        default: 'ipo'
      dry:
        description: 'dry-run (true=미리보기만 / false=실제 반영+export+업로드)'
        required: false
        default: 'true'

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Repo checkout
        uses: actions/checkout@v4

      - name: Python 3.12 setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r auto/requirements.txt

      - name: 명단 백필 (step1-only)
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          DRY=""
          if [ "${{ github.event.inputs.dry }}" = "true" ]; then DRY="--dry"; fi
          python -X utf8 auto/backfill_ecm_names.py --kind "${{ github.event.inputs.kind }}" $DRY

      - name: web JSON 빌드 + root 배치 (dry=false 일 때만)
        if: ${{ github.event.inputs.dry == 'false' }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python -X utf8 auto/export_web_ecm.py
          cp web/ecm_data.json ecm_data.json
          cp web/ecm_meta.json ecm_meta.json
          cp web/ecm_summary.json ecm_summary.json
          ls -la ecm_data.json ecm_meta.json ecm_summary.json

      - name: Supabase Storage 업로드 (dry=false 일 때만)
        if: ${{ github.event.inputs.dry == 'false' }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          for f in ecm_data.json ecm_meta.json ecm_summary.json; do
            echo "Uploading $f to site-data ..."
            HTTP_CODE=$(curl --silent --show-error --output /tmp/upload-resp.txt --write-out "%{http_code}" \
              -X POST "$SUPABASE_URL/storage/v1/object/site-data/$f" \
              -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
              -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
              -H "Content-Type: application/json" \
              -H "x-upsert: true" \
              --data-binary "@$f")
            if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "201" ]; then
              echo "[FAIL] $f upload — HTTP $HTTP_CODE"
              cat /tmp/upload-resp.txt
              exit 1
            fi
            echo "[ok] $f uploaded (HTTP $HTTP_CODE)"
          done
