<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>발행정보 편집 — Numbers Pool Admin</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
  <script>(function(){var k=localStorage.getItem('deallist-theme');if(k!=='light')document.documentElement.setAttribute('data-theme','dark');})();</script>
  <link rel="stylesheet" href="../../../deallist.css?v=20260601f" />
  <link rel="stylesheet" href="../../admin.css?v=20260603c" />
  <style>
    [hidden] { display: none !important; }
    .seg { display: inline-flex; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; margin-bottom: 16px; }
    .seg button { padding: 8px 18px; background: var(--surface); color: var(--muted); border: 0; font-size: 13.5px; font-weight: 700; cursor: pointer; }
    .seg button.active { background: var(--accent); color: #fff; }
    .seg button:disabled { opacity: .5; cursor: not-allowed; }

    .edit-table input { width: 100%; box-sizing: border-box; padding: 5px 7px; border: 1px solid var(--border); border-radius: 5px; background: var(--bg); color: var(--text); font-size: 12.5px; font-family: inherit; }
    .edit-table input:focus { outline: none; border-color: var(--accent); background: var(--surface); }
    .edit-table input.num { text-align: right; }
    .edit-table input[readonly] { background: transparent; border-color: transparent; color: var(--muted); cursor: default; }
    .edit-table input.locked { border-color: var(--accent); background: var(--accent-soft); }
    .edit-table .comp-cell { font-size: 11.5px; color: var(--accent-2); font-weight: 700; text-align: right; white-space: nowrap; background: var(--accent-soft); }
    .edit-table td { padding: 6px 8px; }
    .edit-table th { font-size: 10.5px; }
    .edit-table .amt-won { min-width: 130px; }
    .cell-eok { font-size: 10px; color: var(--muted); text-align: right; display: block; margin-top: 2px; }
    .save-cell { white-space: nowrap; }
    .row-saved td { background: var(--green-bg) !important; transition: background .3s; }

    .reflect-note { font-size: 12px; color: var(--muted); line-height: 1.6; margin: 4px 0 0; }
    .edit-hint { background: var(--accent-soft); color: var(--accent-2); border-radius: 8px; padding: 10px 14px; font-size: 12.5px; line-height: 1.6; margin-bottom: 16px; }

    .filter-bar input[type="date"] { padding: 6px 8px; border: 1px solid var(--border); border-radius: 6px; background: var(--surface); color: var(--text); font-size: 13px; font-family: inherit; }
    .quick-btns { display: inline-flex; gap: 4px; }
    .qbtn { padding: 6px 11px; border: 1px solid var(--border); border-radius: 6px; background: var(--surface); color: var(--muted); font-size: 12.5px; font-weight: 600; cursor: pointer; }
    .qbtn:hover { color: var(--text); }
    .qbtn.on { background: var(--accent-soft); color: var(--accent-2); border-color: var(--accent); }
    .pager { display: flex; align-items: center; gap: 6px; justify-content: center; margin-top: 16px; flex-wrap: wrap; }
    .pager button { padding: 5px 11px; border: 1px solid var(--border); border-radius: 6px; background: var(--surface); color: var(--text); font-size: 12.5px; cursor: pointer; }
    .pager button:disabled { opacity: .45; cursor: not-allowed; }
    .pager .pinfo { font-size: 12.5px; color: var(--muted); margin: 0 8px; }
  </style>
</head>
<body>

  <div class="admin-shell">

    <header class="admin-top">
      <a href="/main/" class="admin-logo" aria-label="Numbers Pool">
        <img src="../../../assets/numbers-pool-logo.png" alt="Numbers Pool" class="light-only" />
        <img src="../../../assets/numbers-pool-logo-dark.png" alt="" class="dark-only" />
        <span class="badge">ADMIN</span>
      </a>
      <div class="admin-user">
        <span class="me" id="me-email">—</span>
        <a href="/account/" class="admin-btn ghost">내 계정</a>
        <a href="/main/" class="admin-btn ghost">사이트로</a>
        <button id="btn-logout" class="admin-btn">로그아웃</button>
        <button id="btn-theme" class="theme-btn" title="다크 모드 전환">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </div>
    </header>

    <nav class="admin-nav" id="admin-nav" hidden>
      <a href="../../">대시보드</a>
      <a href="../../members/">회원 관리</a>
      <a href="../">데이터 관리</a>
      <a href="../../settings/">설정</a>
    </nav>

    <main class="admin-main">

      <div id="guard-msg" class="guard-box" hidden></div>

      <section id="panel" hidden>
        <h2>발행정보 편집</h2>

        <div class="edit-hint">
          발행사명으로 검색 → 값을 수정하고 <strong>저장</strong>하면 ① 원본 테이블에 영구 저장 ② 발행정보 페이지·메인 KPI에 즉시 반영됩니다. 청약일·발행사·회차(키)는 수정 불가.
          <br/>※ <strong>수정한 칸은 자동 잠금</strong>(골드 테두리) — 다음 자동수집(DART)이 그 칸은 덮어쓰지 않습니다. 잠그지 않은 다른 칸은 후속 공시로 정상 갱신됩니다.
        </div>

        <div class="seg">
          <button id="seg-dcm" class="active" data-market="dcm">DCM · 채권</button>
          <button id="seg-ecm" data-market="ecm">ECM · 주식</button>
        </div>

        <div class="filter-bar">
          <label>기간
            <input id="f-from" type="date" />
            <span style="color:var(--muted);">~</span>
            <input id="f-to" type="date" />
          </label>
          <div class="quick-btns">
            <button class="qbtn" data-q="3m">최근 3개월</button>
            <button class="qbtn" data-q="6m">최근 6개월</button>
            <button class="qbtn on" data-q="1y">최근 1년</button>
            <button class="qbtn" data-q="all">전체</button>
          </div>
          <input id="q" type="search" placeholder="발행사 검색" style="min-width:160px;" autocomplete="off" />
          <select id="f-type"><option value="">종류 전체</option></select>
          <select id="f-rating"><option value="">등급 전체</option></select>
          <button id="btn-search" class="admin-btn">조회</button>
          <button id="btn-reset" class="admin-btn ghost">초기화</button>
          <div class="spacer"></div>
          <span class="count" id="count"></span>
        </div>

        <div id="results"></div>
        <div id="pager" class="pager"></div>
      </section>

    </main>

    <footer class="admin-foot">
      Numbers Pool 관리자 · 발행정보 수정은 원본 테이블에 저장되며 사이트에 즉시 반영됩니다.
    </footer>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../../../supabase-client.js?v=20260602g"></script>
  <script src="../../../auth-helper.js?v=20260603a"></script>
  <script src="../../../data-loader.js?v=20260602g"></script>
  <script src="app.js?v=20260603j"></script>
</body>
</html>
