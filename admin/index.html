<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>관리자 — Numbers Pool</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
  <script>(function(){var k=localStorage.getItem('deallist-theme');if(k!=='light')document.documentElement.setAttribute('data-theme','dark');})();</script>
  <link rel="stylesheet" href="../deallist.css?v=20260601f" />
  <link rel="stylesheet" href="../auth.css?v=20260602j" />
  <link rel="stylesheet" href="admin.css?v=20260603c" />
</head>
<body>

  <div class="admin-shell">

    <header class="admin-top">
      <a href="/main/" class="admin-logo" aria-label="Numbers Pool">
        <img src="../assets/numbers-pool-logo.png" alt="Numbers Pool" class="light-only" />
        <img src="../assets/numbers-pool-logo-dark.png" alt="" class="dark-only" />
        <span class="badge">ADMIN</span>
      </a>
      <div class="admin-user">
        <span class="me" id="me-email">—</span>
        <a href="/account/" class="admin-btn ghost">내 계정</a>
        <a href="/main/" class="admin-btn ghost">사이트로</a>
        <button id="btn-logout" class="admin-btn">로그아웃</button>
        <button id="btn-theme" class="theme-btn" title="다크 모드 전환">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </div>
    </header>

    <nav class="admin-nav" id="admin-nav" hidden>
      <a href="./" class="active">대시보드</a>
      <a href="members/">회원 관리</a>
      <a href="data/">데이터 관리</a>
      <a href="settings/">설정</a>
    </nav>

    <main class="admin-main">

      <!-- 권한 없음/비로그인 안내 -->
      <div id="guard-msg" class="guard-box" hidden></div>

      <!-- 대시보드 본문 -->
      <section id="dash" hidden>
        <h2>대시보드</h2>

        <div class="dash-grid">
          <div class="dash-cell" id="cell-pending">
            <div class="dl">승인 대기</div>
            <div class="dv" id="c-pending">—</div>
          </div>
          <div class="dash-cell">
            <div class="dl">전체 회원</div>
            <div class="dv" id="c-members">—</div>
          </div>
          <div class="dash-cell">
            <div class="dl">승인 회원</div>
            <div class="dv" id="c-approved">—</div>
          </div>
          <div class="dash-cell">
            <div class="dl">DCM 레코드</div>
            <div class="dv" id="c-dcm">—</div>
            <div class="ds" id="u-dcm"></div>
          </div>
          <div class="dash-cell">
            <div class="dl">ECM (IPO+유증)</div>
            <div class="dv" id="c-ecm">—</div>
            <div class="ds" id="u-ecm"></div>
          </div>
        </div>

        <div class="quick-grid">
          <a href="members/" class="quick-card">
            <div class="qc-badge" id="q-pending" hidden></div>
            <div class="qc-title">👥 회원 관리</div>
            <div class="qc-desc">가입 승인·거절, 권한 해제·강제 탈퇴, 회원 검색·필터</div>
          </a>
          <a href="data/" class="quick-card">
            <div class="qc-title">🗄️ 데이터 관리</div>
            <div class="qc-desc">DCM·ECM 수동 수집, xlsx 업로드, 레코드 삭제·변경 이력</div>
          </a>
          <a href="settings/" class="quick-card">
            <div class="qc-title">⚙️ 설정</div>
            <div class="qc-desc">자동승인 도메인, 사이트 공지 배너 관리</div>
          </a>
        </div>
      </section>

    </main>

    <footer class="admin-foot">
      Numbers Pool 관리자 · 데이터 변경은 audit_log 에 기록됩니다.
    </footer>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../supabase-client.js?v=20260602g"></script>
  <script src="../auth-helper.js?v=20260603a"></script>
  <script src="../data-loader.js?v=20260602g"></script>
  <script src="home.js?v=20260603a"></script>
</body>
</html>
