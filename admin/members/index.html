<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>회원 관리 — Numbers Pool Admin</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
  <script>(function(){var k=localStorage.getItem('deallist-theme');if(k!=='light')document.documentElement.setAttribute('data-theme','dark');})();</script>
  <link rel="stylesheet" href="../../deallist.css?v=20260601f" />
  <link rel="stylesheet" href="../admin.css?v=20260603c" />
</head>
<body>

  <div class="admin-shell">

    <header class="admin-top">
      <a href="/main/" class="admin-logo" aria-label="Numbers Pool">
        <img src="../../assets/numbers-pool-logo.png" alt="Numbers Pool" class="light-only" />
        <img src="../../assets/numbers-pool-logo-dark.png" alt="" class="dark-only" />
        <span class="badge">ADMIN</span>
      </a>
      <div class="admin-user">
        <span class="me" id="me-email">—</span>
        <a href="/account/" class="admin-btn ghost">내 계정</a>
        <a href="/main/" class="admin-btn ghost">사이트로</a>
        <button id="btn-logout" class="admin-btn">로그아웃</button>
        <button id="btn-theme" class="theme-btn" title="다크 모드 전환">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </div>
    </header>

    <nav class="admin-nav" id="admin-nav" hidden>
      <a href="../">대시보드</a>
      <a href="./" class="active">회원 관리</a>
      <a href="../data/">데이터 관리</a>
      <a href="../settings/">설정</a>
    </nav>

    <main class="admin-main">

      <div id="guard-msg" class="guard-box" hidden></div>

      <section id="panel" hidden>
        <h2>회원 관리</h2>

        <div class="filter-bar">
          <label>상태
            <select id="f-status">
              <option value="" selected>전체</option>
              <option value="pending">승인 대기</option>
              <option value="approved">승인됨</option>
              <option value="rejected">거절</option>
              <option value="revoked">해제</option>
            </select>
          </label>
          <input id="f-search" type="search" placeholder="이메일 / 이름 / 연락처 검색" />
          <button id="btn-refresh" class="admin-btn ghost">새로고침</button>
          <div class="spacer"></div>
          <button id="btn-csv" class="admin-btn">CSV 내보내기</button>
          <span class="count" id="count"></span>
        </div>

        <div class="table-scroll">
          <table class="admin-table">
            <thead>
              <tr>
                <th>가입일</th>
                <th>이메일</th>
                <th>이름</th>
                <th>연락처</th>
                <th>방법</th>
                <th>상태</th>
                <th>역할</th>
                <th>작업</th>
              </tr>
            </thead>
            <tbody id="rows">
              <tr><td colspan="8" id="loading-row">불러오는 중...</td></tr>
            </tbody>
          </table>
        </div>
        <div id="empty" class="empty-row" hidden>표시할 회원이 없습니다.</div>
      </section>

    </main>

    <footer class="admin-foot">
      Numbers Pool 관리자 · 회원 정보는 RLS 로 보호되며 관리자만 열람·관리할 수 있습니다.
    </footer>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../../supabase-client.js?v=20260602g"></script>
  <script src="../../auth-helper.js?v=20260603a"></script>
  <script src="app.js?v=20260603b"></script>
</body>
</html>
