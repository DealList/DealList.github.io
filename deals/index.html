<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Numbers Pool — 공모 회사채 발행 정보</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
  <script>(function(){var k=localStorage.getItem('deallist-theme');if(k!=='light')document.documentElement.setAttribute('data-theme','dark');})();</script>
  <link rel="stylesheet" href="../deallist.css?v=20260526104243" />
  <link rel="stylesheet" href="style.css?v=20260526104243" />
  <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
</head>
<body>

  <!-- Nav -->
  <div id="nav-mount" data-active="dcm-deals" data-root=".."></div>
  <script src="../nav.js?v=20260526104243"></script>

  <!-- Sub-header -->
  <header class="v1-subheader">
    <div class="row">
      <div>
        <div class="kicker">DCM · 회차 단위 발행 내역</div>
        <h1>공모 회사채 발행 정보</h1>
      </div>
      <!-- 최종 업데이트 + 전체 건수: 모두 nav (#nav-updated) 로 통합.
           #count 는 hidden 상태로만 유지 (app.js 호환). 표시는 nav. -->
      <span id="updated" hidden></span>
      <span id="count" hidden></span>
    </div>
  </header>

  <!-- KPI strip (filled by app.js — see README for new HTML template) -->
  <section class="kpi-strip" id="kpi-grid"></section>

  <!-- Filters -->
  <section class="filters">
    <div class="filter-row">
      <label>기간 (청약일 기준)
        <div class="date-range">
          <input type="date" id="f-date-start" />
          <span class="dash">~</span>
          <input type="date" id="f-date-end" />
        </div>
        <div class="date-presets">
          <button type="button" data-preset="3m">최근 3개월</button>
          <button type="button" data-preset="6m">최근 6개월</button>
          <button type="button" data-preset="1y">최근 1년</button>
          <button type="button" data-preset="all">전체</button>
        </div>
      </label>
      <label>발행사 검색
        <input id="f-issuer" type="search" list="issuers-datalist"
               placeholder="예: 미래에셋증권 (엔터로 추가)"
               autocomplete="off" />
        <datalist id="issuers-datalist"></datalist>
        <div class="issuer-chips" id="f-issuer-chips"></div>
        <div class="filter-hint">최대 10개까지 추가 가능</div>
      </label>
      <div class="filter-col">
        <label>종류
          <select id="f-type"></select>
        </label>
        <label>신용등급
          <div class="rating-range">
            <select id="f-rating-min"></select>
            <span class="dash">~</span>
            <select id="f-rating-max"></select>
          </div>
        </label>
      </div>
      <div class="filter-col">
        <label>주관 증권사
          <select id="f-lead-select"></select>
          <div class="issuer-chips" id="f-lead-chips"></div>
        </label>
        <label>인수 증권사
          <select id="f-uw-select"></select>
          <div class="issuer-chips" id="f-uw-chips"></div>
          <div class="filter-hint">각각 최대 5개까지 추가 가능</div>
        </label>
      </div>
    </div>
    <div class="filter-actions">
      <button id="btn-search" class="btn primary">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        조회
      </button>
      <button id="btn-reset" class="btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
        검색 조건 초기화
      </button>
      <button id="btn-download" class="btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Excel로 다운로드
      </button>
      <span id="result-count" class="result-count"></span>
    </div>
  </section>

  <!-- Table -->
  <section class="table-wrap">
    <table id="grid">
      <thead>
        <tr>
          <th data-sort="date">청약일</th>
          <th data-sort="issuer">발행사</th>
          <th data-sort="series">회차</th>
          <th data-sort="type">종류</th>
          <th data-sort="rating">신용등급</th>
          <th data-sort="maturity">만기일</th>
          <th data-sort="init" class="num">최초모집(억)</th>
          <th data-sort="limit" class="num">발행한도(억)</th>
          <th data-sort="demand" class="num">수요예측(억)</th>
          <th data-sort="final" class="num">최종발행(억)</th>
          <th data-sort="series_total" class="num">회차합산(억)</th>
          <th data-sort="ratio" class="num">경쟁률</th>
          <th data-sort="r_target">희망금리</th>
          <th data-sort="r_demand">수요금리</th>
          <th data-sort="r_final" class="num">최종금리(%)</th>
          <th>주관사</th>
          <th>인수사</th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
    <div id="empty" class="empty hidden">조건에 맞는 발행 건이 없습니다.</div>
  </section>

  <nav id="pager" class="pager"></nav>

  <footer class="v1-foot">
    <div>출처: 금융감독원 DART · 본 정보는 참고용으로 제공되며 투자 판단의 근거가 될 수 없습니다.</div>
    <div><a href="../about/">데이터 안내</a></div>
  </footer>

  <script src="app.js?v=20260526104243"></script>
</body>
</html>
