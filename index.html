<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deal List</title>
  <link rel="stylesheet" href="landing.css" />
</head>
<body class="landing">
  <header class="landing-header">
    <button id="btn-theme" class="theme-toggle" title="다크 모드 전환">🌙</button>
    <p class="category">Korea Capital Market</p>
    <h1>Deal List</h1>
  </header>

  <main class="landing-main">
    <section class="section">
      <h2 class="section-title">DCM</h2>
      <div class="kpi-grid" id="kpi-grid"></div>
      <div class="card-grid">
        <a class="landing-card" href="deals/">
          <div class="card-icon">📄</div>
          <h3>공모 회사채 발행 정보</h3>
          <span class="card-arrow">→</span>
        </a>
        <a class="landing-card" href="brokers/">
          <div class="card-icon">📊</div>
          <h3>공모 회사채 주관·인수 실적</h3>
          <span class="card-arrow">→</span>
        </a>
        <a class="landing-card" href="charts/">
          <div class="card-icon">📈</div>
          <h3>공모 회사채 인포그래픽</h3>
          <span class="card-arrow">→</span>
        </a>
      </div>
    </section>

    <section class="section">
      <h2 class="section-title">ECM</h2>
      <div class="card-grid">
        <div class="landing-card disabled" aria-disabled="true">
          <div class="card-icon">📄</div>
          <h3>IPO·유상증자 정보</h3>
          <span class="card-badge">개발 중</span>
        </div>
        <div class="landing-card disabled" aria-disabled="true">
          <div class="card-icon">📊</div>
          <h3>IPO·유상증자 주관·인수 실적</h3>
          <span class="card-badge">개발 중</span>
        </div>
        <div class="landing-card disabled" aria-disabled="true">
          <div class="card-icon">📈</div>
          <h3>IPO·유상증자 인포그래픽</h3>
          <span class="card-badge">개발 중</span>
        </div>
      </div>
    </section>
  </main>

  <footer class="landing-footer">
    <small><a href="about/" style="color:inherit;text-decoration:underline;">데이터 안내</a></small>
    <small>출처: 금융감독원 DART · 본 정보는 참고용으로 제공되며 투자 판단의 근거가 될 수 없습니다.</small>
  </footer>

  <script>
    // 다크 모드 토글 (페이지 로드 시 즉시 적용)
    (function () {
      const root = document.documentElement;
      const KEY = "deallist-theme";
      if (localStorage.getItem(KEY) === "dark") root.setAttribute("data-theme", "dark");
      document.addEventListener("DOMContentLoaded", () => {
        const btn = document.getElementById("btn-theme");
        if (!btn) return;
        const upd = () => btn.textContent = root.getAttribute("data-theme") === "dark" ? "☀️" : "🌙";
        upd();
        btn.addEventListener("click", () => {
          if (root.getAttribute("data-theme") === "dark") {
            root.removeAttribute("data-theme");
            localStorage.setItem(KEY, "light");
          } else {
            root.setAttribute("data-theme", "dark");
            localStorage.setItem(KEY, "dark");
          }
          upd();
        });
      });
    })();
  </script>
  <script>
  (async function () {
    const BROKER_FULL = {
      "BNK":"BNK투자증권","DB":"DB금융투자","IBK":"IBK투자증권","KB":"KB증권",
      "KR":"KR투자증권","LS":"LS증권","NH":"NH투자증권","SK":"SK증권","iM":"iM증권",
      "교보":"교보증권","다올":"다올투자증권","대신":"대신증권","디에스":"DS투자증권",
      "리딩":"리딩투자증권","메리츠":"메리츠증권","미래":"미래에셋증권","부국":"부국증권",
      "산은":"한국산업은행","삼성":"삼성증권","상상인":"상상인증권","신영":"신영증권",
      "신한":"신한투자증권","우리":"우리투자증권","유안타":"유안타증권","유진":"유진투자증권",
      "케이프":"케이프투자증권","코리아에셋":"코리아에셋투자증권","키움":"키움증권",
      "하나":"하나증권","한양":"한양증권","한투":"한국투자증권","한화":"한화투자증권",
      "현차":"현대차증권","흥국":"흥국증권"
    };
    try {
      const s = await fetch("summary.json").then(r => r.json());
      const fmtAmt = (eok) => {
        if (eok >= 10000) {
          const jo = Math.floor(eok / 10000);
          const rest = Math.round(eok % 10000);
          return `${jo.toLocaleString()}조 ${rest.toLocaleString()}억`;
        }
        return `${Math.round(eok).toLocaleString()}억`;
      };
      const chg = (v) => v == null ? "" :
        (v > 0 ? `↑ ${v}%` : v < 0 ? `↓ ${Math.abs(v)}%` : "변동 없음");
      const monthLabel = s.this_month_label.replace("-", "년 ") + "월";
      const grid = document.getElementById("kpi-grid");
      grid.innerHTML = `
        <div class="kpi-card">
          <div class="kpi-icon blue">📄</div>
          <div class="kpi-body">
            <div class="kpi-label">${monthLabel} 발행건수</div>
            <div class="kpi-value">${s.this_month_count}건</div>
            <div class="kpi-sub">${chg(s.this_month_count_change)} (전월 대비)</div>
          </div>
        </div>
        <div class="kpi-card">
          <div class="kpi-icon green">💰</div>
          <div class="kpi-body">
            <div class="kpi-label">${monthLabel} 발행총액</div>
            <div class="kpi-value">${fmtAmt(s.this_month_amount)}</div>
            <div class="kpi-sub">${chg(s.this_month_amount_change)} (전월 대비)</div>
          </div>
        </div>
        <div class="kpi-card">
          <div class="kpi-icon orange">🏆</div>
          <div class="kpi-body">
            <div class="kpi-label">올해 주관 1위</div>
            <div class="kpi-value broker-name">${BROKER_FULL[s.this_year_top_broker] || s.this_year_top_broker}</div>
            <div class="kpi-sub">${fmtAmt(s.this_year_top_amount)} · 점유율 ${s.this_year_top_share}%</div>
          </div>
        </div>
        <div class="kpi-card">
          <div class="kpi-icon purple">📈</div>
          <div class="kpi-body">
            <div class="kpi-label">올해 최대 단일 발행</div>
            <div class="kpi-value broker-name">${s.this_year_biggest_issuer} ${s.this_year_biggest_series}회차</div>
            <div class="kpi-sub">${fmtAmt(s.this_year_biggest_amount)} · ${s.this_year_biggest_date}</div>
          </div>
        </div>
      `;
    } catch (e) { console.error(e); }
  })();
  </script>
</body>
</html>
