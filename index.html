<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deal List</title>
  <link rel="stylesheet" href="landing.css" />
</head>
<body class="landing">
  <header class="landing-header">
    <h1>Deal List</h1>
  </header>

  <main class="landing-main">
    <section class="section">
      <h2 class="section-title">DCM</h2>
      <div class="card-grid">
        <a class="landing-card" href="deals/">
          <div class="card-icon">📄</div>
          <h3>공모 회사채 발행 정보</h3>
          <span class="card-arrow">→</span>
        </a>
        <a class="landing-card" href="brokers/">
          <div class="card-icon">📊</div>
          <h3>공모 회사채 주관·인수 실적</h3>
          <span class="card-arrow">→</span>
        </a>
        <a class="landing-card" href="charts/">
          <div class="card-icon">📈</div>
          <h3>공모 회사채 인포그래픽</h3>
          <span class="card-arrow">→</span>
        </a>
      </div>
    </section>

    <section class="section">
      <h2 class="section-title">ECM</h2>
      <div class="card-grid">
        <div class="landing-card disabled" aria-disabled="true">
          <div class="card-icon">📄</div>
          <h3>IPO·유상증자 정보</h3>
          <span class="card-badge">개발 중</span>
        </div>
        <div class="landing-card disabled" aria-disabled="true">
          <div class="card-icon">📊</div>
          <h3>IPO·유상증자 주관·인수 실적</h3>
          <span class="card-badge">개발 중</span>
        </div>
        <div class="landing-card disabled" aria-disabled="true">
          <div class="card-icon">📈</div>
          <h3>IPO·유상증자 인포그래픽</h3>
          <span class="card-badge">개발 중</span>
        </div>
      </div>
    </section>
  </main>

  <footer class="landing-footer">
    <small>출처: 금융감독원 DART · 본 정보는 참고용으로 제공되며 투자 판단의 근거가 될 수 없습니다.</small>
  </footer>
</body>
</html>
