<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>새 비밀번호 설정 — Numbers Pool</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
  <script>(function(){var k=localStorage.getItem('deallist-theme');if(k!=='light')document.documentElement.setAttribute('data-theme','dark');})();</script>
  <link rel="stylesheet" href="../../deallist.css?v=20260601f" />
  <link rel="stylesheet" href="../../auth.css?v=20260602j" />
  <style>
    .form-hint { font-size: 11.5px; color: var(--muted); margin: 6px 0 0; line-height: 1.55; }
    .form-hint.err { color: #b91c1c; }
    :root[data-theme="dark"] .form-hint.err { color: #fca5a5; }
  </style>
</head>
<body>

  <div class="auth-page">

    <a href="../../" class="auth-logo" aria-label="Numbers Pool 홈으로">
      <span class="auth-kicker">Korea Capital Market</span>
      <img src="../../assets/numbers-pool-logo.png" alt="Numbers Pool" class="light-only" />
      <img src="../../assets/numbers-pool-logo-dark.png" alt="" class="dark-only" />
    </a>

    <!-- 정상 진입 (유효한 recovery 링크) -->
    <main class="auth-wrap" id="reset-card" hidden>
      <h1>새 비밀번호 설정</h1>
      <div class="sub">새 비밀번호를 입력해주세요.</div>

      <form id="reset-form">
        <label for="password">새 비밀번호</label>
        <input id="password" type="password" autocomplete="new-password" required />
        <div class="form-hint" id="pw-hint">
          반복 문자/숫자 4자 이상 불가하며 영문·숫자·특수문자 중 2가지 이상 조합하여 8~32자 내로 입력.
        </div>

        <label for="password2">새 비밀번호 확인</label>
        <input id="password2" type="password" autocomplete="new-password" required />
        <div class="form-hint" id="pw2-hint" hidden></div>

        <button type="submit" class="btn-primary" id="btn-reset">비밀번호 변경</button>
      </form>

      <div id="msg"></div>
    </main>

    <!-- 잘못/만료된 링크 -->
    <main class="auth-wrap" id="invalid-card" hidden>
      <h1>유효하지 않은 링크</h1>
      <div class="sub">
        비밀번호 재설정 링크가 유효하지 않거나 만료되었습니다.<br/>
        다시 요청해주세요.
      </div>
      <a href="../forgot/" class="btn-primary" style="display:block; text-align:center; text-decoration:none; line-height:24px; margin-top: 18px;">
        비밀번호 재설정 다시 요청
      </a>
      <div class="foot-link">
        ← <a href="../">로그인으로 돌아가기</a>
      </div>
    </main>

    <footer class="auth-footer">
      © Numbers Pool · 한국 자본시장 데이터 플랫폼<br/>
      출처: 금융감독원 DART
    </footer>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../../supabase-client.js?v=20260602g"></script>
  <script src="../../auth-helper.js?v=20260602c"></script>
  <script src="app.js?v=20260603a"></script>
</body>
</html>
