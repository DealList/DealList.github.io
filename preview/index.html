<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DealList · Design Preview</title>
<meta name="description" content="DealList 디자인 시안 미리보기 — V1~V4 비교용. 본 페이지는 시안 검토용이며 정식 페이지가 아닙니다.">
<meta name="robots" content="noindex,nofollow">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600;8..60,700&family=Noto+Serif+KR:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">

<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #0a0a0a; font-family: Pretendard, -apple-system, sans-serif; }
  #root { width: 100%; height: 100%; }
  /* Loading splash */
  .preview-splash {
    position: fixed; inset: 0; background: #0a0a0a; color: #fff;
    display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 12px;
    font-family: Pretendard, sans-serif; z-index: 100;
    transition: opacity 0.3s; pointer-events: none;
  }
  .preview-splash.hidden { opacity: 0; }
  .preview-splash .logo {
    font-family: "Source Serif 4", serif; font-size: 28px; font-weight: 600; letter-spacing: -0.5px;
  }
  .preview-splash .logo .l { font-style: italic; color: #c1995a; }
  .preview-splash .sub { font-size: 12px; color: rgba(255,255,255,0.5); }
  .preview-splash .spin {
    width: 24px; height: 24px; border: 2px solid rgba(255,255,255,0.15);
    border-top-color: #fff; border-radius: 50%; animation: sp 0.8s linear infinite; margin-top: 8px;
  }
  @keyframes sp { to { transform: rotate(360deg); } }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div class="preview-splash" id="splash">
  <div class="logo">Dea<span class="l">l</span>List Preview</div>
  <div class="sub">디자인 시안을 불러오는 중…</div>
  <div class="spin"></div>
</div>
<div id="root"></div>

<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="v1-terminal.jsx"></script>
<script type="text/babel" src="v2-editorial.jsx"></script>
<script type="text/babel" src="v3-ft.jsx"></script>
<script type="text/babel" src="v4-minimal.jsx"></script>
<script type="text/babel" src="app.jsx"></script>

<script>
  // Hide splash once the React app has actually painted.
  // We listen for the first 'summary-loaded' event (fired from loadSummary in app.jsx boot).
  window.addEventListener('summary-loaded', () => {
    setTimeout(() => {
      const sp = document.getElementById('splash');
      if (sp) { sp.classList.add('hidden'); setTimeout(() => sp.remove(), 350); }
    }, 100);
  }, { once: true });
  // Safety: hide after 6s no matter what
  setTimeout(() => {
    const sp = document.getElementById('splash');
    if (sp) { sp.classList.add('hidden'); setTimeout(() => sp.remove(), 350); }
  }, 6000);
</script>
</body>
</html>
