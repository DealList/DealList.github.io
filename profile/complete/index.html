<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>프로필 완성 — Numbers Pool</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
  <script>(function(){var k=localStorage.getItem('deallist-theme');if(k!=='light')document.documentElement.setAttribute('data-theme','dark');})();</script>
  <link rel="stylesheet" href="../../deallist.css?v=20260601f" />
  <link rel="stylesheet" href="../../auth.css?v=20260602j" />
  <script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
  <style>
    .auth-wrap.profile-wrap { max-width: 640px; }

    /* ─── 약관 동의 섹션 (Google 가입자만 표시) ─── */
    .terms-section {
      margin: 22px 0 8px;
      padding: 18px 18px 22px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
    }
    .terms-section .sec-title {
      font-size: 13px; font-weight: 700; color: var(--text);
      margin: 0 0 12px;
    }
    .terms-all {
      display: flex; align-items: center; gap: 9px;
      padding: 10px 14px; margin-bottom: 14px;
      background: var(--accent-soft);
      border-radius: 7px; cursor: pointer;
      font-size: 13.5px; font-weight: 700; color: var(--accent-2);
    }
    .terms-all input { width: 16px; height: 16px; cursor: pointer; margin: 0; }
    .terms-item { margin-bottom: 12px; }
    .terms-item:last-child { margin-bottom: 0; }
    .terms-check {
      display: flex; align-items: center; gap: 8px;
      cursor: pointer; font-size: 13px; font-weight: 700; color: var(--text);
      margin-bottom: 7px;
    }
    .terms-check input { width: 15px; height: 15px; margin: 0; cursor: pointer; }
    .terms-check em {
      font-style: normal; font-weight: 600; margin-left: 2px;
      color: #dc2626;
    }
    .terms-check em.opt { color: var(--muted); }
    :root[data-theme="dark"] .terms-check em { color: #fca5a5; }
    .terms-text {
      max-height: 130px; overflow-y: auto;
      padding: 11px 14px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 11.5px; line-height: 1.7; color: var(--text-2);
      white-space: pre-line;
    }
    .terms-text h4 {
      font-size: 11.5px; font-weight: 700; color: var(--text);
      margin: 10px 0 5px;
    }
    .terms-text h4:first-child { margin-top: 0; }
    .terms-mkt-hint {
      font-size: 11px; color: var(--muted); margin: 0 0 0 23px; line-height: 1.55;
    }

    /* 연락처·주소 폼 — signup 과 동일 패턴 */
    .form-hint { font-size: 11.5px; color: var(--muted); margin: 6px 0 0; line-height: 1.55; }
    .phone-group { display: flex; align-items: center; gap: 6px; }
    .phone-group input { flex: 1; min-width: 0; text-align: center; }
    .phone-group .sep { color: var(--muted); font-weight: 700; }
    .addr-group { display: flex; flex-direction: column; gap: 8px; }
    .addr-zip-line { display: flex; gap: 8px; }
    .addr-zip-line input { flex: 1; background: var(--bg); cursor: default; color: var(--text); }
    .addr-zip-line input:focus { outline: none; }
    .addr-zip-line .btn-zip {
      padding: 0 18px; background: var(--text-2); color: var(--surface);
      border: 0; border-radius: 7px; font-size: 13px; font-weight: 700; cursor: pointer;
      white-space: nowrap;
    }
    .addr-zip-line .btn-zip:hover { opacity: 0.85; }
    .addr-group .addr-main { background: var(--bg); cursor: default; }

    label .lbl-opt { color: var(--muted); font-weight: 500; font-size: 11.5px; margin-left: 6px; }

    .skip-link {
      display: block; text-align: center; margin-top: 14px;
      color: var(--muted); text-decoration: none; font-size: 13px;
    }
    .skip-link:hover { color: var(--text); }

    #btn-save:disabled { background: var(--border); color: var(--muted); border-color: var(--border); cursor: not-allowed; }
    :root[data-theme="dark"] #btn-save:disabled { color: var(--muted); }
  </style>
</head>
<body>

  <div class="auth-page">

    <a href="../../" class="auth-logo" aria-label="Numbers Pool 홈으로">
      <span class="auth-kicker">Korea Capital Market</span>
      <img src="../../assets/numbers-pool-logo.png" alt="Numbers Pool" class="light-only" />
      <img src="../../assets/numbers-pool-logo-dark.png" alt="" class="dark-only" />
    </a>

    <main class="auth-wrap profile-wrap">
      <h1>프로필 완성</h1>
      <div class="sub" id="welcome-sub">Numbers Pool 이용을 위해 추가 정보를 입력해주세요.</div>

      <div class="info-box" style="margin-top: 8px;">
        <div class="lbl">로그인 계정</div>
        <div class="val" id="me-email">—</div>
      </div>

      <!-- ═══ 추가 정보 폼 ═══ -->
      <form id="profile-form" autocomplete="off">

        <label>연락처 <span class="lbl-opt">(선택)</span></label>
        <div class="phone-group">
          <input id="phone1" type="text" maxlength="3" placeholder="010" inputmode="numeric" />
          <span class="sep">-</span>
          <input id="phone2" type="text" maxlength="4" placeholder="1234" inputmode="numeric" />
          <span class="sep">-</span>
          <input id="phone3" type="text" maxlength="4" placeholder="5678" inputmode="numeric" />
        </div>

        <label>주소 <span class="lbl-opt">(선택)</span></label>
        <div class="addr-group">
          <div class="addr-zip-line">
            <input id="zipcode" type="text" placeholder="우편번호" readonly />
            <button type="button" class="btn-zip" id="btn-zipcode">우편번호 검색</button>
          </div>
          <input id="address" class="addr-main" type="text" placeholder="기본 주소" readonly />
          <input id="address-detail" type="text" placeholder="상세 주소 (예: 미라클빌딩 11층)" />
        </div>

        <button type="submit" class="btn-primary" id="btn-save">저장하고 시작</button>
      </form>

      <a href="/main/" class="skip-link" id="skip-link" hidden>나중에 입력하기 →</a>

      <div id="msg"></div>
    </main>

    <footer class="auth-footer">
      © Numbers Pool · 한국 자본시장 데이터 플랫폼
    </footer>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../../supabase-client.js?v=20260602g"></script>
  <script src="../../auth-helper.js?v=20260603a"></script>
  <script src="app.js?v=20260603a"></script>
</body>
</html>
