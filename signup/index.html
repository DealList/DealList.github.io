<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>가입 신청 — Numbers Pool</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
  <script>(function(){var k=localStorage.getItem('deallist-theme');if(k!=='light')document.documentElement.setAttribute('data-theme','dark');})();</script>
  <link rel="stylesheet" href="../deallist.css?v=20260601f" />
  <link rel="stylesheet" href="../auth.css?v=20260602j" />
  <!-- 카카오(다음) 우편번호 검색 — 키 없이 무료 -->
  <script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
  <style>
    .auth-wrap.signup-wrap { max-width: 520px; }
    .form-hint {
      font-size: 11.5px; color: var(--muted);
      margin: 6px 0 0; line-height: 1.55;
    }
    .form-hint.err { color: #b91c1c; }
    :root[data-theme="dark"] .form-hint.err { color: #fca5a5; }

    /* 연락처 3분할 */
    .phone-group { display: flex; align-items: center; gap: 6px; }
    .phone-group input { flex: 1; min-width: 0; text-align: center; }
    .phone-group .sep { color: var(--muted); font-weight: 700; }

    /* 주소 그룹 */
    .addr-group { display: flex; flex-direction: column; gap: 8px; }
    .addr-zip-line { display: flex; gap: 8px; }
    .addr-zip-line input { flex: 1; background: var(--bg); cursor: default; color: var(--text); }
    .addr-zip-line input:focus { outline: none; }
    .addr-zip-line .btn-zip {
      padding: 0 18px;
      background: var(--text-2);
      color: var(--surface);
      border: 0;
      border-radius: 7px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.15s;
    }
    .addr-zip-line .btn-zip:hover { opacity: 0.85; }
    .addr-group .addr-main { background: var(--bg); cursor: default; }

    /* honeypot — 화면에서 완전히 안 보이게 */
    .hp-field {
      position: absolute !important;
      left: -9999px !important;
      width: 1px; height: 1px;
      opacity: 0;
      pointer-events: none;
    }

    /* "선택" 표시 라벨 */
    label .lbl-opt { color: var(--muted); font-weight: 500; font-size: 11.5px; margin-left: 6px; }
  </style>
</head>
<body>

  <div class="auth-page">

    <a href="../" class="auth-logo" aria-label="Numbers Pool 홈으로">
      <span class="auth-kicker">Korea Capital Market</span>
      <img src="../assets/numbers-pool-logo.png" alt="Numbers Pool" class="light-only" />
      <img src="../assets/numbers-pool-logo-dark.png" alt="" class="dark-only" />
    </a>

    <!-- 이미 로그인된 상태 카드 -->
    <main class="auth-wrap" id="already-card" hidden>
      <h1>이미 로그인되어 있습니다</h1>
      <div class="sub">아래 계정으로 로그인된 상태입니다.</div>
      <div class="info-box">
        <div class="lbl">로그인 계정</div>
        <div class="val" id="already-email">—</div>
      </div>
      <button class="btn-primary" id="btn-continue" type="button">계속 사용</button>
      <button class="btn-google" id="btn-switch" type="button" style="margin-top: 10px;">
        로그아웃하고 다른 계정으로 가입
      </button>
    </main>

    <!-- 가입 신청 폼 -->
    <main class="auth-wrap signup-wrap" id="signup-card">
      <h1>가입 신청</h1>
      <div class="sub">정보를 입력하고 신청해주세요.</div>

      <p class="approval-pill">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <span>가입 후 <strong>관리자 승인</strong>을 거쳐야 이용 가능합니다</span>
      </p>

      <div style="margin-top: 18px;">
        <button id="btn-google" class="btn-google" type="button">
          <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
            <path fill="#4285F4" d="M22.5 12.27c0-.79-.07-1.54-.2-2.27H12v4.51h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.22-4.74 3.22-8.32z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.1c-.22-.66-.35-1.36-.35-2.1s.13-1.44.35-2.1V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.83z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.83C6.71 7.31 9.14 5.38 12 5.38z"/>
          </svg>
          Google로 가입
        </button>
      </div>

      <div class="divider"><span>또는 이메일로</span></div>

      <form id="signup-form" autocomplete="off">

        <label for="email">이메일 <span class="lbl-opt">(아이디로 사용)</span></label>
        <input id="email" type="email" autocomplete="email" required />

        <label for="password">비밀번호</label>
        <input id="password" type="password" autocomplete="new-password" required />
        <div class="form-hint" id="pw-hint">
          반복 문자/숫자 4자 이상 불가하며 영문·숫자·특수문자 중 2가지 이상 조합하여 8~32자 내로 입력.
        </div>

        <label for="password2">비밀번호 확인</label>
        <input id="password2" type="password" autocomplete="new-password" required />
        <div class="form-hint" id="pw2-hint" hidden></div>

        <label for="name">이름</label>
        <input id="name" type="text" required />

        <label>연락처 <span class="lbl-opt">(선택)</span></label>
        <div class="phone-group">
          <input id="phone1" type="text" maxlength="3" placeholder="010" inputmode="numeric" />
          <span class="sep">-</span>
          <input id="phone2" type="text" maxlength="4" placeholder="1234" inputmode="numeric" />
          <span class="sep">-</span>
          <input id="phone3" type="text" maxlength="4" placeholder="5678" inputmode="numeric" />
        </div>

        <label>주소 <span class="lbl-opt">(선택)</span></label>
        <div class="addr-group">
          <div class="addr-zip-line">
            <input id="zipcode" type="text" placeholder="우편번호" readonly />
            <button type="button" class="btn-zip" id="btn-zipcode">우편번호 검색</button>
          </div>
          <input id="address" class="addr-main" type="text" placeholder="기본 주소" readonly />
          <input id="address-detail" type="text" placeholder="상세 주소 (예: 미라클빌딩 11층)" />
        </div>

        <!-- honeypot: 사람은 안 보이지만 봇은 채울 가능성 → 채워지면 차단 -->
        <input type="text" id="hp-website" name="website" tabindex="-1" autocomplete="off" class="hp-field" />

        <button type="submit" class="btn-primary" id="btn-signup">가입 신청</button>
      </form>

      <div id="msg"></div>

      <div class="foot-link">
        이미 가입하셨나요?<a href="../login/">로그인</a>
      </div>
    </main>

    <footer class="auth-footer">
      © Numbers Pool · 한국 자본시장 데이터 플랫폼<br/>
      출처: 금융감독원 DART
    </footer>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../supabase-client.js?v=20260602g"></script>
  <script src="../auth-helper.js?v=20260603a"></script>
  <script src="app.js?v=20260603d"></script>
</body>
</html>
